# orze.yaml — AdderBoard competition config

# --- REQUIRED ---
train_script: train.py
ideas_file: ideas.md
base_config: configs/base.yaml
results_dir: results
python: /ceph/workspace/erik/adderboard/venv/bin/python3

# --- ENV ---
train_extra_env:
  PYTHONUNBUFFERED: "1"

# --- GPU SCHEDULING (VRAM-based) ---
gpu_scheduling:
  max_vram_pct: 85          # stop filling GPU at 85% VRAM
  min_free_vram_mib: 2000   # require 2GB free minimum
  max_jobs_per_gpu: 200     # safety cap (VRAM-based)
  max_load_per_cpu: 1.0     # throttle when load/cpu exceeds this (shared machine)
  min_free_ram_gb: 32       # throttle when free RAM drops below 32GB

# --- TIMEOUTS ---
timeout: 259200
poll: 30
stall_minutes: 60
max_idea_failures: 2
orphan_timeout_hours: 2
min_disk_gb: 50

# --- CLEANUP ---
cleanup:
  interval: 50
  patterns:
    - "checkpoint_epoch*.pt"
    - "*.tmp"

# --- LLM AUTO-FIX ---
max_fix_attempts: 2

# --- GC (checkpoint cleanup) ---
gc:
  enabled: true
  checkpoints_dir: results
  keep_top: 20
  keep_recent: 10
  min_free_gb: 50

# --- REPORT ---
report:
  title: "AdderBoard Research Report"
  primary_metric: accuracy
  sort: descending
  columns:
    - {key: "accuracy", label: "Accuracy", fmt: ".4f"}
    - {key: "num_params", label: "Params", fmt: "d"}
    - {key: "verify_accuracy", label: "Verify Acc", fmt: ".4f"}
    - {key: "qualified", label: "Qualified", fmt: ""}
    - {key: "training_time", label: "Time(s)", fmt: ".0f"}

# --- RETROSPECTION ---
retrospection:
  enabled: true
  interval: 6
  auto_pause: false
  plateau_window: 10
  fail_window: 10
  fail_threshold: 0.8

# --- RESEARCH AGENT ---
roles:
  research:
    mode: claude
    rules_file: RESEARCH_RULES.md
    cooldown: 120
    timeout: 600
    model: opus
    allowed_tools: "Read,Write,Edit,Glob,Grep,Bash"
