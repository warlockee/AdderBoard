# Bug fixer: escalation — healthy → fixing → backing_off → healthy
#
# Coordinates with quality_gate: quality_gate pauses research,
# bug_fixer attempts to fix the root cause. When fixes work,
# quality_gate will unpause (since failure rate drops).
#
# bug_fixer does NOT write .pause_research (quality_gate owns that).
# bug_fixer only tracks fix attempts and backs off when exhausted.

name: bug_fixer
initial: healthy

vars:
  fail_window: 10
  fail_threshold: 0.5
  max_fixes_per_hour: 3
  fixes_this_hour: 0

states:
  - name: healthy
    transitions:
      # High failure rate → engage fixer
      - to: fixing
        guards: [failure_rate_high]
        actions: [record_pre_fix_state, notify]

  - name: fixing
    transitions:
      # Fix succeeded (failure rate dropped)
      - to: healthy
        guards: [recent_fix_succeeded]
        actions: [reset_fix_counter, notify]
      # Too many fixes attempted this hour
      - to: backing_off
        guards: [bug_fixer_fixes_exhausted]
        actions: [notify]
      # Failure rate normalized on its own (not our fix)
      - to: healthy
        guards: ["!failure_rate_high"]
        actions: [reset_fix_counter]

  - name: backing_off
    transitions:
      # Failure rate normalized → resume
      - to: healthy
        guards: ["!failure_rate_high"]
        actions: [reset_fix_counter, notify]
      # Deadlock escape
      - to: healthy
        guards: [is_deadlocked]
        actions: [reset_fix_counter, notify]
